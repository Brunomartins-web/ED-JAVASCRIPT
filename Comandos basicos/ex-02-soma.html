<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: brown;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1{
            color: white;
            display: flex;
            justify-content: center;
            text-align: center;
        }

        p{
            color: white;
            display: flex;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo</h1>
    <p>Seja bem vindo, Javascript!</p>

    <script>
        let n1 = Number.parseInt(window.prompt("DIGITE UM NUMERO"));
        let n2 = Number.parseInt(window.prompt("DIGITE O SEGUNDO NUMERO"));
        // Podemos usar apenas Number() para converter a string em numero, mas o parseInt() é mais especifico para inteiros.

        soma = n1 + n2;

        window.alert("A soma desses dois numero é " + soma);
    </script>
</body>
</html>

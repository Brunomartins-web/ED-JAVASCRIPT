<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let n1 = Number(window.prompt('Digite o Primeiro Numero:'));
        let n2 = Number(window.prompt('Digite o Segundo Numero'));

        let adicao = n1 + n2;
        let subtracao = n1 - n2;
        let multiplicacao = n1 * n2;
        let divisao = n1 / n2;

        document.write(`Aqui estão todos os valores dos numeros escolhidos! <br>`);
        document.write(`A Adição dos numeros é ${adicao} <br>`);
        document.write(`A Subtração dos numeros é ${subtracao} <br>`);
        document.write(`A Multiplicação dos numeros é ${multiplicacao} <br>`);
        document.write(`A Divisão dos numeros é ${divisao}`);
    </script>
</body>
</html>

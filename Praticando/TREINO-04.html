<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: brown;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            color: white;
            display: flex;
            justify-content: center;
            text-align: center;
        }

        p {
            color: white;
            display: flex;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Olá, Mundo</h1>
    <p>Seja bem vindo, Javascript!</p>

    <script>
        let AV1 = Number(window.prompt("Digite a nota da AV1"));
        let AV2 = Number(window.prompt("Digite a nota da AV2"));

        let media = (AV1 + AV2) / 2;

        if (media < 6) {
            document.write(`Sua média é ${media}. Reprovado!`)
        } else {
            document.write(`Sua média é ${media}. Aprovado!`)
        }
    </script>
</body>

</html>

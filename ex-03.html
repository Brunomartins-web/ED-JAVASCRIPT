<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: brown;
            font-family: Arial, Helvetica, sans-serif;
        }

        .center{
            display: flex;
    
            justify-content: center;
            align-items: center;
         
        }

        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            

        h1{
            color: white;
            display: flex;
            justify-content: center;
            text-align: center;
        }

        p{
            color: white;
            display: flex;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="center">
        <div class="container">
            <h1>Olá, Mundo</h1>
            <p>Seja bem vindo, Javascript!</p>
        </div>
    </div>

    <script>
        let n1 = Number(window.prompt("DIGITE O PRIMEIRO NUMERO"));
        let n2 = Number(window.prompt("DIGITE O SEGUNDO NUMERO"));

        soma = n1 + n2;

        window.alert("A soma desses dois numero é " + soma );
    </script>
</body>
</html>

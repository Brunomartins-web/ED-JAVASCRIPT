<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body{
        height: 100vh;
        background-color: rgb(255, 255, 255);
        display: flex;

        flex-direction: column;

        justify-content: center;
        align-items: center;
        text-align: center;
    }

    h1{
        font-size: 40px;
        color: rgb(0, 0, 0);
        font-weight: 700;
    }

    p{
        font-size: 20px;
        color: rgb(0, 0, 0);
        font-weight: 500;
    }

    div{
        border: 1px solid rgb(0, 0, 0);
        background-color: rgb(0, 0, 0);
        padding: 10px;
        margin: 15px;
        color: rgb(252, 252, 252);
      }
</style>
<body>

    <h1>Iniciando estudos com DOM</h1>
    
    <p>Aqui vai o resultado</p>
    <p>Aprendendo a Usar <strong>DOM</strong> em Javascrip</p>

    <div>CLIQUE EM MIM</div>
    
    <script>

        let corpo =  window.document.body 

        let p1 = document.getElementsByTagName("p")[0]

        let p2 = document.getElementsByTagName("p")[1]

        // corpo.style.backgroundColor = "black"


        window.document.write(`Está escrito assim no primeiro paragrafo: ${p1.innerText} <br>`)

        window.document.write(`Está escrito assim no segundo paragrafo: ${p2.innerText}`)
    </script>
</body>
</html>
